<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <title>📝 Lista de Tarefas</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <h1>📝 Tarefas a fazer</h1>

    <form class="form" id="form-tarefa">
      <input type="text" id="tarefa" placeholder="Digite a Tarefa..." />
      <input class="data" type="datetime-local" id="horario" placeholder="Definir horário"/>
      <button type="submit">Adicionar a tarefa</button>
    </form>

    <div class="tabela-container">
      <table>
        <thead>
          <tr>
            <th>🗒️ Tarefa</th>
            <th>🕒 Horário</th>
            <th>🔄 Status</th>
            <th>⬜ Ações</th>
          </tr>
        </thead>
        <tbody id="listaTarefas">
          <!-- As tarefas serão adicionadas aqui -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>

</html>
